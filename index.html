<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your personalized Eid greeting card with Microsoft Student Clubs at New Mansoura University">
  <title>Eid Card Generator - MSC-NMU</title>

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="MSC-NMU Eid Card Generator">
  <meta property="og:description" content="Create your personalized Eid card with MSC-NMU">
  <meta property="og:image" content="./assets/template.png">
  <meta property="og:type" content="website">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="./assets/logo.png">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- Step 1: Input Page -->
  <main class="input-page">
    <div class="input-card">
      <!-- Logo -->
      <div class="logo-wrapper">
        <img src="./assets/logo.png" alt="MSC-NMU Logo" class="logo" />
      </div>

      <!-- Title -->
      <h1 class="title">Eid Card Generator</h1>
      <p class="subtitle">Create your personalized Eid greeting card</p>

      <!-- Form -->
      <form id="cardForm" novalidate>
        <!-- Upload Area -->
        <div class="form-group">
          <div class="upload-area" id="uploadArea">
            <div class="upload-content">
              <div class="upload-icon-wrapper">
                <svg class="upload-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="17 8 12 3 7 8"></polyline>
                  <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
              </div>
              <p class="upload-text">Drop your photo here or click to browse</p>
              <p class="upload-hint">PNG, JPG up to 5MB</p>
            </div>
            <input type="file" id="imageUpload" accept="image/png,image/jpeg,image/jpg" hidden />
          </div>
          <div class="error-message" id="photoError">Please upload a photo</div>
        </div>

        <!-- Uploaded Preview -->
        <div class="uploaded-preview" id="uploadedPreview" style="display: none;">
          <img id="previewImage" src="" alt="Photo preview" />
          <button type="button" class="remove-image" id="removeImage" aria-label="Remove photo">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>

        <!-- Name Input -->
        <div class="form-group">
          <label for="fullName">Your Name</label>
          <input 
            type="text" 
            id="fullName" 
            name="fullName" 
            placeholder="Enter your full name"
            autocomplete="name"
          />
          <div class="error-message" id="nameError">Please enter your name</div>
        </div>

        <!-- Position Input -->
        <div class="form-group">
          <label for="position">Position / Role</label>
          <input 
            type="text" 
            id="position" 
            name="position" 
            placeholder="e.g. Member, Coordinator, Team Lead"
          />
        </div>

        <!-- Generate Button -->
        <button type="submit" class="btn-generate" id="generateBtn">
          Generate My Card
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </form>
    </div>
  </main>

  <!-- Step 2: Result Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <!-- Confetti Container -->
    <div class="confetti-container" id="confettiContainer"></div>
    
    <!-- Sparkles Container -->
    <div class="sparkles-container" id="sparklesContainer"></div>

    <!-- Modal Content -->
    <div class="modal-content" id="modalContent">
      <h2 class="modal-title">Your Eid Card is Ready!</h2>
      
      <!-- Canvas Wrapper -->
      <div class="canvas-wrapper">
        <canvas id="cardCanvas" width="1080" height="1080"></canvas>
      </div>

      <!-- Action Buttons -->
      <div class="modal-actions">
        <button type="button" class="btn-action btn-download" id="downloadBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Download
        </button>

        <button type="button" class="btn-action btn-share" id="shareBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="18" cy="5" r="3"></circle>
            <circle cx="6" cy="12" r="3"></circle>
            <circle cx="18" cy="19" r="3"></circle>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
          </svg>
          Share
        </button>
      </div>

      <!-- Back Button -->
      <button type="button" class="btn-back" id="backBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Make Another
      </button>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="./script.js"></script>
</body>
</html>
